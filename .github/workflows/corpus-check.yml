# Corpus regression check + repo-wide script syntax CI (bead x30b).
#
# Both jobs are CREDS-FREE by design: run-corpus.sh --check is pure
# stdlib-python3 + bash (PyYAML optional — corpus_check.py has a structural
# fallback), and the syntax job only parses files. No secrets are used or
# needed anywhere in this workflow — keep it that way.
#
# Runner deps (verified): ubuntu-24.04 ships python3 (3.12), ruby (3.x) and
# bash preinstalled — no setup-* actions required. Pinned to ubuntu-24.04
# (not -latest) so a runner-image rollover can't silently change the
# interpreters. Whole workflow budget: < 2 minutes (locally ~1 s + ~5 s).
name: corpus-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  corpus:
    name: corpus --check (creds-free goldens)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate every corpus case against its golden
        run: ./corpus/run-corpus.sh --check
      - name: Converter-default regression (issue #227 — vendored default, no silent dev-checkout)
        # Creds-free, network-free: proves each orchestrator defaults to the pinned
        # vendored bundle and only uses a local build via an explicit env/flag.
        run: ./corpus/converter-default-test.sh

  script-syntax:
    name: syntax-check every script (ruby -c / py_compile / bash -n)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Parse every tracked .rb / .py / .sh file
        # Cheap repo-wide syntax CI: a script that doesn't even parse must
        # never reach main. Shebang-aware for .sh files because a few scripts
        # carry a .sh name with a ruby shebang (e.g. setup-tableau.sh).
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r f; do
            ruby -c "$f" >/dev/null || { echo "::error file=$f::ruby syntax error"; fail=1; }
          done < <(git ls-files '*.rb')
          while IFS= read -r f; do
            python3 -m py_compile "$f" || { echo "::error file=$f::python syntax error"; fail=1; }
          done < <(git ls-files '*.py')
          while IFS= read -r f; do
            shebang=$(head -1 "$f")
            case "$shebang" in
              *ruby*)   ruby -c "$f" >/dev/null || { echo "::error file=$f::ruby syntax error"; fail=1; } ;;
              *python*) python3 -m py_compile "$f" || { echo "::error file=$f::python syntax error"; fail=1; } ;;
              *)        bash -n "$f" || { echo "::error file=$f::bash syntax error"; fail=1; } ;;
            esac
          done < <(git ls-files '*.sh')
          echo "checked: $(git ls-files '*.rb' | wc -l) rb, $(git ls-files '*.py' | wc -l) py, $(git ls-files '*.sh' | wc -l) sh"
          exit $fail

  shared-libs:
    name: shared-lib drift gate (canonical == every vendored copy)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Assert no vendored shared file has drifted from its canonical
        # Vendored shared infra (lib/sigma_rest.rb, the lints, escalate-gap.py,
        # etc.) must stay byte-identical to shared/. Edit the canonical copy,
        # run tools/sync-shared.rb, commit the fan-out. Intentional forks are
        # allowlisted in shared/manifest.json. Creds-free, stdlib ruby only.
        run: ruby tools/check-shared.rb

  skill-lint:
    name: skill conformance (mandatory gates documented)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Lint every converter SKILL.md for the mandatory arc gates
        # Each converter must document the C3 reuse / C5 readback / C7 layout /
        # C8 parity / C9 RLS gates and appear in docs/phase-schema.md. Known
        # gaps are tracked in tools/skill-lint-baseline.json (WARN, not fail).
        run: ruby tools/lint-skills.rb

  unit-tests:
    name: offline unit/regression tests (creds-free)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run offline test-*.rb suites
        # EXPLICIT allow-list — only tests that need NO Tableau/Sigma creds or
        # network. Do NOT add test-calc-discovery.rb (needs a Tableau token);
        # keep this workflow creds-free. New offline test-*.rb → add its path here.
        run: |
          set -uo pipefail
          tests=(
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-param-swap-translation.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-rls-wiring.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-table-calc-translation.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-topn-filter-emission.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-styled-text-extraction.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-styled-text-body.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-styled-text-layout.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-kpi-scorecard-detection.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-kpi-composite-emit.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-element-id-namespacing.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-fact-pick.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-layout-lint.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-parity-score.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-aggregate-dimension.rb
            plugins/tableau-to-sigma/skills/tableau-to-sigma/scripts/test-param-measure-picker.rb
            plugins/tableau-to-sigma/skills/tableau-assessment/scripts/test-predicted-parity.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-dax-restructure.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-telemetry-gate.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-intake.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-verify-warehouse.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-build-parity-plan.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-pbi-element-match.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-pbi-timeintel-route.rb
            plugins/powerbi-to-sigma/skills/powerbi-to-sigma/scripts/test-drop-unresolved-columns.rb
          )
          fail=0
          for t in "${tests[@]}"; do
            echo "::group::$t"
            if ruby "$t"; then echo "OK $t"; else echo "::error file=$t::test failed"; fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
      - name: Run offline test_*.py suites
        # EXPLICIT allow-list — creds-free, network-free Python tests only.
        # PyYAML is needed by the looker offline dashboard parser
        # (parse_lookml_dashboard.py); the runner does not ship it by default.
        # New offline test_*.py → add its path here.
        run: |
          set -uo pipefail
          python3 -m pip install --quiet pyyaml
          tests=(
            plugins/looker-to-sigma/skills/looker-to-sigma/tests/test_grid_fidelity.py
          )
          fail=0
          for t in "${tests[@]}"; do
            echo "::group::$t"
            if python3 "$t"; then echo "OK $t"; else echo "::error file=$t::test failed"; fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
